<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Noto+Sans+JP:wght@500;700;800&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 1200px; height: 630px;
        font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
        overflow: hidden;
    }
    body {
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
        color: white;
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
    }
    .badge {
        display: inline-block;
        background: rgba(255,255,255,0.18);
        border: 1.5px solid rgba(255,255,255,0.35);
        padding: 10px 24px;
        border-radius: 999px;
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 28px;
        width: fit-content;
        letter-spacing: 0.02em;
    }
    .logo {
        font-size: 132px;
        font-weight: 800;
        letter-spacing: -3px;
        line-height: 1;
        margin-bottom: 28px;
    }
    .logo-accent {
        background: linear-gradient(180deg, #fde68a 0%, #fbbf24 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .headline {
        font-size: 58px;
        font-weight: 800;
        line-height: 1.25;
        margin-bottom: 26px;
        letter-spacing: -0.5px;
    }
    .subline {
        font-size: 24px;
        font-weight: 500;
        opacity: 0.95;
        max-width: 920px;
        line-height: 1.55;
    }
    .url {
        position: absolute;
        bottom: 50px;
        right: 80px;
        font-size: 24px;
        font-weight: 700;
        opacity: 0.92;
        letter-spacing: 0.02em;
    }
</style>
</head>
<body>
    <div class="badge">✦ あたらしい自己紹介ページ</div>
    <div class="logo">Profi<span class="logo-accent">m</span></div>
    <div class="headline">あなたのすべてを、<br>ひとつのページに。</div>
    <div class="subline">ニックネーム・自己紹介・好きなもの・推し・SNS リンクを 1 ページにまとめて。</div>
    <div class="url">profie.me</div>
</body>
</html>
