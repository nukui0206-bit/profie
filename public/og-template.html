<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <title>OG Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Noto+Sans+JP:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #fff; }
        .og {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            color: #fff;
            position: relative;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', system-ui, sans-serif;
        }
        .og::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 18% 20%, rgba(255,255,255,0.32), transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(255,255,255,0.18), transparent 55%);
        }
        .og::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 1px 1px, rgba(255,255,255,0.15) 1px, transparent 0);
            background-size: 24px 24px;
            opacity: 0.35;
            mask-image: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0));
            -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0));
        }
        .inner {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
        }
        .badge {
            display: inline-block;
            align-self: flex-start;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 28px;
            letter-spacing: 0.04em;
        }
        .logo {
            font-size: 92px;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 28px;
        }
        .logo .accent {
            background: linear-gradient(180deg, #fde68a, #fbcfe8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .copy {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            font-family: 'Noto Sans JP', sans-serif;
        }
        .sub {
            font-size: 24px;
            font-weight: 500;
            opacity: 0.9;
            line-height: 1.6;
            max-width: 760px;
            font-family: 'Noto Sans JP', sans-serif;
        }
        .url {
            position: absolute;
            bottom: 48px;
            right: 64px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.02em;
            opacity: 0.85;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="og">
        <div class="inner">
            <span class="badge">✦ あたらしい自己紹介ページ</span>
            <div class="logo">Profi<span class="accent">e</span></div>
            <div class="copy">あなたのすべてを、<br>ひとつのページに。</div>
            <div class="sub">ニックネーム・自己紹介・好きなもの・推し・SNS リンクを 1 ページにまとめて。</div>
        </div>
        <div class="url">profie.me</div>
    </div>
</body>
</html>
